<svg width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bridgeGrad" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" />
      <stop offset="1" stop-color="#1E3A8A" />
    </linearGradient>
    <linearGradient id="globeGrad" x1="50" y1="10" x2="50" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981" />
      <stop offset="1" stop-color="#047857" />
    </linearGradient>
  </defs>
  
  <!-- Globe Base -->
  <circle cx="50" cy="50" r="45" fill="url(#globeGrad)" opacity="0.2" />
  
  <!-- Bridge Arch -->
  <path d="M20 70 Q50 15 85 45" stroke="url(#bridgeGrad)" stroke-width="14" stroke-linecap="round" />
  <path d="M30 90 Q65 60 80 20" stroke="#10B981" stroke-width="14" stroke-linecap="round" />
  
  <!-- Center Connection Node -->
  <circle cx="55" cy="50" r="10" fill="#ffffff" />
  <circle cx="55" cy="50" r="5" fill="#2563EB" />
</svg>